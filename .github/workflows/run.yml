name: Run iOS Simulator

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SIM_NAME: E2ETestSim
  TEST_APP_BUNDLE_ID: com.test.E2ETestApp

jobs:
  run:
    name: 🚀 E2E Simulator
    runs-on: macos-latest
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: 🔨 Build the CLI tool
      run: |
        dotnet build AppleDev.Tool/AppleDev.Tool.csproj
        echo "TOOL=$PWD/AppleDev.Tool/bin/Debug/net10.0/apple.dll" >> "$GITHUB_ENV"
        mkdir -p artifacts

    - name: 🔨 Build test iOS app
      run: |
        APP_DIR="/tmp/E2ETestApp.app"
        mkdir -p "$APP_DIR"

        SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
        echo "Using simulator SDK: $SDK_PATH"

        cat > /tmp/main.m << 'OBJC'
        #import <UIKit/UIKit.h>
        @interface AppDelegate : UIResponder <UIApplicationDelegate>
        @property (strong, nonatomic) UIWindow *window;
        @end
        @implementation AppDelegate
        - (BOOL)application:(UIApplication *)app didFinishLaunchingWithOptions:(NSDictionary *)opts {
            self.window = [[UIWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
            UIViewController *vc = [UIViewController new];
            vc.view.backgroundColor = [UIColor systemBlueColor];
            UILabel *label = [[UILabel alloc] initWithFrame:CGRectMake(50, 200, 300, 50)];
            label.text = @"E2E Test App";
            label.textColor = [UIColor whiteColor];
            label.font = [UIFont systemFontOfSize:24 weight:UIFontWeightBold];
            [vc.view addSubview:label];
            self.window.rootViewController = vc;
            [self.window makeKeyAndVisible];
            return YES;
        }
        @end
        int main(int argc, char *argv[]) {
            @autoreleasepool { return UIApplicationMain(argc, argv, nil, @"AppDelegate"); }
        }
        OBJC

        clang -isysroot "$SDK_PATH" \
          -framework UIKit \
          -arch arm64 \
          -target arm64-apple-ios17.0-simulator \
          -fobjc-arc \
          -o "$APP_DIR/E2ETestApp" \
          /tmp/main.m

        cat > "$APP_DIR/Info.plist" << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.test.E2ETestApp</string>
            <key>CFBundleName</key>
            <string>E2ETestApp</string>
            <key>CFBundleExecutable</key>
            <string>E2ETestApp</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>UILaunchScreen</key>
            <dict/>
        </dict>
        </plist>
        PLIST

        codesign --force --sign - "$APP_DIR"
        echo "TEST_APP_PATH=$APP_DIR" >> "$GITHUB_ENV"
        echo "✅ Built native iOS test app"

    - name: Do Create simulator
      run: |
        RESULT=$(dotnet $TOOL simulator create "$SIM_NAME" --device-type "iPhone 16" --format json)
        echo "Create result: $RESULT"
        UDID=$(echo "$RESULT" | jq -r '.udid')
        echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

    - name: Validate Create simulator
      run: |
        if [ -z "$SIMULATOR_UDID" ] || [ "$SIMULATOR_UDID" = "null" ]; then
          echo "❌ Failed to parse UDID from create output"
          exit 1
        fi
        SIMS=$(dotnet $TOOL simulator list --format json)
        if ! echo "$SIMS" | jq -e --arg udid "$SIMULATOR_UDID" '.[] | select(.udid == $udid)' > /dev/null 2>&1; then
          echo "❌ Simulator $SIMULATOR_UDID not found in simulator list after create"
          exit 1
        fi
        echo "✅ Simulator '$SIM_NAME' ($SIMULATOR_UDID) created successfully"

    - name: Do Boot simulator
      run: |
        RESULT=$(dotnet $TOOL simulator boot "$SIMULATOR_UDID" --wait --timeout 300 --format json)
        echo "Boot result: $RESULT"

    - name: Validate Boot simulator
      run: |
        SIMS=$(dotnet $TOOL simulator list --format json)
        if ! echo "$SIMS" | jq -e --arg udid "$SIMULATOR_UDID" '.[] | select(.udid == $udid and .state == "Booted")' > /dev/null 2>&1; then
          echo "❌ Simulator $SIMULATOR_UDID not found as Booted"
          echo "$SIMS" | jq --arg name "$SIM_NAME" '.[] | select(.name == $name)'
          exit 1
        fi
        echo "✅ Simulator $SIMULATOR_UDID is Booted"

    - name: Do Install test app
      run: dotnet $TOOL simulator app install "$SIMULATOR_UDID" "$TEST_APP_PATH"

    - name: Validate Install test app
      run: |
        FOUND=0
        for i in $(seq 1 12); do
          APPS=$(dotnet $TOOL simulator app list "$SIMULATOR_UDID" --format json)
          if echo "$APPS" | jq -e --arg bid "$TEST_APP_BUNDLE_ID" '.[] | select(.CFBundleIdentifier == $bid)' > /dev/null 2>&1; then
            echo "✅ App installed and verified via CLI (attempt $i)"
            FOUND=1
            break
          fi
          echo "Attempt $i/12 - app not visible yet, waiting 5s..."
          sleep 5
        done
        if [ "$FOUND" -ne 1 ]; then
          echo "❌ $TEST_APP_BUNDLE_ID not found in app list after retries"
          echo "$APPS" | jq '.[].CFBundleIdentifier' | head -20
          exit 1
        fi

    - name: Do Launch test app
      run: |
        echo "APP_LAUNCH_TIME=$(date '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_ENV"
        dotnet $TOOL simulator app launch "$SIMULATOR_UDID" "$TEST_APP_BUNDLE_ID"

    - name: Validate Launch test app
      timeout-minutes: 5
      run: |
        FOUND=0
        for i in $(seq 1 30); do
          APPS=$(dotnet $TOOL simulator app list "$SIMULATOR_UDID" --format json 2>/dev/null || true)
          if echo "$APPS" | jq -e --arg bid "$TEST_APP_BUNDLE_ID" '.[] | select(.CFBundleIdentifier == $bid)' > /dev/null 2>&1; then
            echo "✅ App $TEST_APP_BUNDLE_ID found running on simulator (attempt $i)"
            FOUND=1
            break
          fi
          echo "Attempt $i/30 - waiting 5s..."
          sleep 5
        done
        if [ "$FOUND" -ne 1 ]; then
          echo "❌ $TEST_APP_BUNDLE_ID not found running after launch"
          exit 1
        fi

    - name: Do Screenshot
      run: dotnet $TOOL simulator screenshot "$SIMULATOR_UDID" -o artifacts/screenshot.png

    - name: Validate Screenshot
      run: |
        if [ ! -f artifacts/screenshot.png ]; then
          echo "❌ Screenshot file not found at artifacts/screenshot.png"
          ls -la artifacts/
          exit 1
        fi
        SIZE=$(stat -f%z artifacts/screenshot.png)
        if [ "$SIZE" -lt 1000 ]; then
          echo "❌ Screenshot file too small ($SIZE bytes), likely invalid"
          exit 1
        fi
        echo "✅ Screenshot captured ($SIZE bytes)"

    - name: Do Gather logs
      run: dotnet $TOOL simulator logs "$SIMULATOR_UDID" --start "$APP_LAUNCH_TIME" --format json > artifacts/simulator-logs.json 2>&1 || true

    - name: Validate Gather logs
      run: |
        if [ ! -f artifacts/simulator-logs.json ]; then
          echo "❌ Logs file not found"
          exit 1
        fi
        SIZE=$(stat -f%z artifacts/simulator-logs.json)
        echo "✅ Logs gathered ($SIZE bytes)"

    - name: Do Uninstall test app
      if: always()
      run: dotnet $TOOL simulator app uninstall "$SIMULATOR_UDID" "$TEST_APP_BUNDLE_ID" || true

    - name: Validate Uninstall test app
      if: always()
      run: |
        APPS=$(dotnet $TOOL simulator app list "$SIMULATOR_UDID" --format json 2>/dev/null) || true
        if echo "$APPS" | jq -e --arg bid "$TEST_APP_BUNDLE_ID" '.[] | select(.CFBundleIdentifier == $bid)' > /dev/null 2>&1; then
          echo "❌ $TEST_APP_BUNDLE_ID still found after uninstall"
          exit 1
        fi
        echo "✅ App uninstalled and verified via CLI"

    - name: 🧹 Cleanup simulator
      if: always()
      run: dotnet $TOOL simulator delete --force "$SIM_NAME"

    - name: 📦 Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-logs
        path: artifacts/
        if-no-files-found: ignore
