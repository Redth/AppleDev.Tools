name: Build and Publish

on:
  pull_request:
  push:
    branches: [ main ]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: 🔨 Build
    runs-on: macos-latest
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # avoid shallow clone so nbgv can do its work.
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: 🔢 Set version variables
      run: dnx -y nbgv cloud
    - name: 📦 Pack
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path .\artifacts
        dotnet pack --output ./artifacts --configuration Release ./AppleDev/AppleDev.csproj
        dotnet pack --output ./artifacts --configuration Release ./AppStoreConnectClient/AppStoreConnectClient.csproj
        dotnet pack --output ./artifacts --configuration Release ./AppleDev.Tool/AppleDev.Tool.csproj
        dotnet pack --output ./artifacts --configuration Release ./AppleDev.Mcp.Server/AppleDev.Mcp.Server.csproj
        dotnet pack --output ./artifacts --configuration Release ./AppleDev.FbIdb/AppleDev.FbIdb.csproj

    - name: 📤 Upload Artifacts
      uses: actions/upload-artifact@v5
      with:
        name: NuGet
        path: ./artifacts

  publish:
    name: 🚀 Publish
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'release'
    steps:
      - name: 📥 Download Artifacts
        uses: actions/download-artifact@v5
        with:
          name: NuGet
      - name: ⚙️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: 🚀 Push NuGet
        run: |
          dotnet nuget push *.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_ORG_API_KEY }}
